services:
 bizmate-web:
  build:
    context: ../BizMate.FE
    dockerfile: Dockerfile
  container_name: bizmate-web
  restart: always
  ports:
    - "81:80"
  depends_on:
    - bizmate-api
  networks:
    - atp_network

  bizmate-api:
    build:
      context: .
      dockerfile: src/BizMate.Api/Dockerfile
    container_name: bizmate-api
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - TZ=Asia/Ho_Chi_Minh
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=atp;Username=atp;Password=atp@
      - ConnectionStrings__Redis=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atp_network

  postgres:
    image: postgres:16-alpine
    container_name: atp-postgres
    restart: always
    environment:
      POSTGRES_USER: atp
      POSTGRES_PASSWORD: atp@
      POSTGRES_DB: atp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atp -d atp"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - atp_network

  redis:
    image: redis:7-alpine
    container_name: atp-redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - atp_network

volumes:
  postgres_data:
    name: bizmate_postgres_data
    driver: local
  redis_data:
    name: bizmate_redis_data
    driver: local

networks:
  atp_network:
    driver: bridge