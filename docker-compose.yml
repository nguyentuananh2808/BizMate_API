services:
  bizmate-web:
    build:
      context: ../BizMate.FE
      dockerfile: Dockerfile
    image: bizmate-web:latest
    container_name: bizmate-web
    restart: unless-stopped
    ports:
      - "83:80"
    depends_on:
      bizmate-api:
        condition: service_started
    networks:
      - atp_network

  bizmate-api:
    build:
      context: .
      dockerfile: src/BizMate.Api/Dockerfile
    image: bizmate-api:latest
    container_name: bizmate-api
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      TZ: Asia/Ho_Chi_Minh
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=atp;Username=atp;Password=atp@"
      ConnectionStrings__Redis: "redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atp_network

  postgres:
    image: postgres:16-alpine
    container_name: atp-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: atp
      POSTGRES_PASSWORD: "atp@"
      POSTGRES_DB: atp
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - atp_network

  redis:
    image: redis:7-alpine
    container_name: atp-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - atp_network

volumes:
  postgres_data:
    name: bizmate_postgres_data

  redis_data:
    name: bizmate_redis_data

networks:
  atp_network:
    driver: bridge